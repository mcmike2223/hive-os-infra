name: Deploy Infra to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST_IP }} >> ~/.ssh/known_hosts

      - name: Sync infra files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='storage/' \
            --exclude='.env' \
            ./ ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }}:/var/www/hive/

      - name: Configure GHCR credentials on VPS
        env:
          GHCR_TOKEN: ${{ secrets.VPS_GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.VPS_GHCR_USER }}
        run: |
          # Build a valid docker config.json on the runner, then scp it to the VPS.
          # This avoids all shell-quoting issues when passing JSON through SSH.
          AUTH=$(printf '%s:%s' "${GHCR_USER}" "${GHCR_TOKEN}" | base64 -w 0)
          mkdir -p /tmp/ghcr-creds
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${AUTH}" > /tmp/ghcr-creds/config.json
          # Ensure the remote .docker dir exists
          ssh ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }} "mkdir -p ~/.docker"
          # Copy the file cleanly — no shell quoting of JSON content
          scp /tmp/ghcr-creds/config.json \
            ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }}:~/.docker/config.json
          ssh ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }} \
            "chmod 600 ~/.docker/config.json && docker pull ghcr.io/${{ secrets.VPS_GHCR_USER }}/hive-os-backend:latest 2>&1 | tail -3"

      - name: Run deploy script on VPS
        run: |
          ssh ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }} \
            "cd /var/www/hive && chmod +x scripts/deploy-prod.sh && bash scripts/deploy-prod.sh"
