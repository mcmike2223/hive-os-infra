name: Deploy Infra to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST_IP }} >> ~/.ssh/known_hosts

      - name: Sync infra files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='storage/' \
            --exclude='.env' \
            ./ ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }}:/var/www/hive/

      - name: Login VPS to GHCR
        run: |
          ssh ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }} \
            "echo '${{ secrets.VPS_GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.VPS_GHCR_USER }}' --password-stdin"

      - name: Run deploy script on VPS
        run: |
          ssh ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_HOST_IP }} \
            "cd /var/www/hive && chmod +x scripts/deploy-prod.sh && bash scripts/deploy-prod.sh"
