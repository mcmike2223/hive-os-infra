name: Deploy Infra to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Infra (compose / Caddyfile) is file-based, not an image, so it is NOT
      # auto-pulled like the backend/frontend. SSH from GitHub runners to the VPS
      # is also blocked by the Hetzner Cloud Firewall (we keep SSH closed to the
      # public on purpose). So infra changes are applied MANUALLY on the VPS:
      #
      #   cd ~/projects/hive
      #   # copy the changed Caddyfile / docker-compose.prod.yml into place, then:
      #   bash scripts/deploy-prod.sh        # full deploy
      #   # or reload Caddy only:  docker exec hive-caddy caddy reload --config /etc/caddy/Caddyfile
      #
      # See deploy/README.md for the pull-based image deploy (backend/frontend).
      - name: Infra apply note
        run: |
          echo "Infra changes are applied manually on the VPS (SSH from runners is firewall-blocked)."
          echo "See deploy/README.md. Apply with scripts/deploy-prod.sh on the host."
