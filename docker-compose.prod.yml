services:
  # Reverse Proxy
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: hive-caddy
    container_name: hive-caddy
    restart: unless-stopped
    dns:
      - ${DOCKER_DNS_1:-1.1.1.1}
      - ${DOCKER_DNS_2:-8.8.8.8}
    env_file:
      - .env
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      ROOT_DOMAIN: ${ROOT_DOMAIN:-gulfingot.com}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-hive.gulfingot.com}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-hive-backend.gulfingot.com}
      REVERB_DOMAIN: ${REVERB_DOMAIN:-hive-ws.gulfingot.com}
      HORIZON_DOMAIN: ${HORIZON_DOMAIN:-hive-queue.gulfingot.com}
      MEILISEARCH_DOMAIN: ${MEILISEARCH_DOMAIN:-hive-search.gulfingot.com}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:-hive-monitor.gulfingot.com}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./storage/caddy_runtime/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./storage/caddy_data:/data
      - ./storage/caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      reverb:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - hive-network

  # Cache
  redis:
    image: redis:alpine
    container_name: hive-redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - hive-network

  # Database
  db:
    image: postgres:17-alpine
    container_name: hive-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hive}
      POSTGRES_USER: ${DB_USERNAME:-hive}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./storage/db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-hive} -d ${DB_DATABASE:-hive}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hive-network

  # Object Storage
  seaweedfs:
    image: chrislusf/seaweedfs:3.94
    container_name: hive-seaweedfs
    restart: unless-stopped
    command: server -dir=/data -s3
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY:-hive-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY:-change-this-seaweedfs-secret}
    volumes:
      - ./storage/seaweedfs-data:/data
    expose:
      - "8333"
      - "9333"
    networks:
      - hive-network

  seaweedfs-bootstrap:
    image: minio/mc:latest
    container_name: hive-seaweedfs-bootstrap
    restart: "no"
    depends_on:
      seaweedfs:
        condition: service_started
    environment:
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:-hive-seaweedfs}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:-change-this-seaweedfs-secret}
      SEAWEEDFS_BUCKET: ${SEAWEEDFS_BUCKET:-hive-production}
    entrypoint: >
      /bin/sh -ec "
        until mc alias set local http://seaweedfs:8333 $${SEAWEEDFS_ACCESS_KEY} $${SEAWEEDFS_SECRET_KEY} >/dev/null 2>&1; do
          sleep 2;
        done;
        mc mb --ignore-existing local/$${SEAWEEDFS_BUCKET} >/dev/null 2>&1 || true;
      "
    networks:
      - hive-network

  seaweedfs-browser:
    image: cloudlena/s3manager:v0.5.0
    container_name: hive-seaweedfs-browser
    restart: unless-stopped
    profiles:
      - ops
    ports:
      - "127.0.0.1:${SEAWEEDFS_BROWSER_HOST_PORT:-9091}:8080"
    environment:
      ENDPOINT: seaweedfs:8333
      REGION: us-east-1
      ACCESS_KEY_ID: ${SEAWEEDFS_ACCESS_KEY:-hive-seaweedfs}
      SECRET_ACCESS_KEY: ${SEAWEEDFS_SECRET_KEY:-change-this-seaweedfs-secret}
      USE_SSL: "false"
      SIGNATURE_TYPE: V4
      FORCE_DOWNLOAD: "false"
      ALLOW_DELETE: "true"
    depends_on:
      seaweedfs:
        condition: service_started
      seaweedfs-bootstrap:
        condition: service_completed_successfully
    networks:
      - hive-network

  # Search
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: hive-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./storage/search-data:/meili_data
    expose:
      - "7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hive-network

  # AI Background Removal
  rembg:
    image: danielgatis/rembg:latest
    container_name: hive-ai-rembg
    restart: unless-stopped
    command: s --host 0.0.0.0 --port 5000
    expose:
      - "5000"
    networks:
      - hive-network

  # Media Converter
  ffmpeg:
    build:
      context: ./ffmpeg-api
      dockerfile: Dockerfile
    image: hive-ffmpeg
    container_name: hive-ffmpeg
    restart: unless-stopped
    expose:
      - "9090"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9090/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - hive-network

  # PDF and Document Converter
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: hive-gotenberg
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - hive-network

  # Laravel Backend
  backend:
    image: ghcr.io/techiveet/hive-os-backend:latest
    container_name: hive-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      OCTANE_SERVER: roadrunner
      SERVER_IP: ${SERVER_IP:-}
      ROOT_DOMAIN: ${ROOT_DOMAIN:-gulfingot.com}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-hive.gulfingot.com}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-hive-backend.gulfingot.com}
      REVERB_DOMAIN: ${REVERB_DOMAIN:-hive-ws.gulfingot.com}
      HORIZON_DOMAIN: ${HORIZON_DOMAIN:-hive-queue.gulfingot.com}
      MEILISEARCH_DOMAIN: ${MEILISEARCH_DOMAIN:-hive-search.gulfingot.com}
      REMBG_DOMAIN: ${REMBG_DOMAIN:-hive-rembg.gulfingot.com}
      GOTENBERG_DOMAIN: ${GOTENBERG_DOMAIN:-hive-docs.gulfingot.com}
      REDIS_DOMAIN: ${REDIS_DOMAIN:-hive-redis.gulfingot.com}
      DB_DOMAIN: ${DB_DOMAIN:-hive-db.gulfingot.com}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      FRONTEND_INTERNAL_URL: ${FRONTEND_INTERNAL_URL:-http://frontend:3000}
      REVERB_INTERNAL_URL: ${REVERB_INTERNAL_URL:-http://reverb:9000}
      QUEUE_INTERNAL_HOST: ${QUEUE_INTERNAL_HOST:-queue}
      DB_HOST: ${DB_INTERNAL_HOST:-db}
      DB_INTERNAL_HOST: ${DB_INTERNAL_HOST:-db}
      REDIS_CLIENT: predis
      REDIS_HOST: ${REDIS_INTERNAL_HOST:-redis}
      REDIS_INTERNAL_HOST: ${REDIS_INTERNAL_HOST:-redis}
      MEILISEARCH_HOST: ${MEILISEARCH_INTERNAL_URL:-http://meilisearch:7700}
      MEILISEARCH_INTERNAL_URL: ${MEILISEARCH_INTERNAL_URL:-http://meilisearch:7700}
      REMBG_INTERNAL_URL: ${REMBG_INTERNAL_URL:-http://rembg:5000}
      GOTENBERG_INTERNAL_URL: ${GOTENBERG_INTERNAL_URL:-http://gotenberg:3000}
      FFMPEG_INTERNAL_URL: ${FFMPEG_INTERNAL_URL:-http://ffmpeg:9090}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: ${REVERB_PORT:-9000}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      PUSHER_HOST: reverb
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      seaweedfs-bootstrap:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      rembg:
        condition: service_started
      gotenberg:
        condition: service_started
      ffmpeg:
        condition: service_healthy
    command: >
      sh -lc '
        mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache &&
        (chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true) &&
        chmod -R ug+rwX storage bootstrap/cache &&
        php artisan optimize:clear &&
        php artisan config:cache &&
        php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8000
      '
    expose:
      - "8000"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - hive-network

  # Queue Worker / Horizon
  queue:
    image: ghcr.io/techiveet/hive-os-backend:latest
    container_name: hive-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      ROOT_DOMAIN: ${ROOT_DOMAIN:-gulfingot.com}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-hive.gulfingot.com}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-hive-backend.gulfingot.com}
      REVERB_DOMAIN: ${REVERB_DOMAIN:-hive-ws.gulfingot.com}
      HORIZON_DOMAIN: ${HORIZON_DOMAIN:-hive-queue.gulfingot.com}
      DB_HOST: ${DB_INTERNAL_HOST:-db}
      DB_INTERNAL_HOST: ${DB_INTERNAL_HOST:-db}
      REDIS_CLIENT: predis
      REDIS_HOST: ${REDIS_INTERNAL_HOST:-redis}
      REDIS_INTERNAL_HOST: ${REDIS_INTERNAL_HOST:-redis}
      MEILISEARCH_HOST: ${MEILISEARCH_INTERNAL_URL:-http://meilisearch:7700}
      MEILISEARCH_INTERNAL_URL: ${MEILISEARCH_INTERNAL_URL:-http://meilisearch:7700}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: ${REVERB_PORT:-9000}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      PUSHER_HOST: reverb
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      seaweedfs-bootstrap:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      sh -lc '
        mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache &&
        (chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true) &&
        chmod -R ug+rwX storage bootstrap/cache &&
        php artisan horizon
      '
    networks:
      - hive-network

  # WebSocket Engine
  reverb:
    image: ghcr.io/techiveet/hive-os-backend:latest
    container_name: hive-reverb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      ROOT_DOMAIN: ${ROOT_DOMAIN:-gulfingot.com}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-hive-backend.gulfingot.com}
      REVERB_DOMAIN: ${REVERB_DOMAIN:-hive-ws.gulfingot.com}
      DB_HOST: ${DB_INTERNAL_HOST:-db}
      DB_INTERNAL_HOST: ${DB_INTERNAL_HOST:-db}
      REDIS_CLIENT: predis
      REDIS_HOST: ${REDIS_INTERNAL_HOST:-redis}
      REDIS_INTERNAL_HOST: ${REDIS_INTERNAL_HOST:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 9000
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: ${REVERB_PORT:-9000}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      PUSHER_HOST: reverb
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      sh -lc '
        mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache &&
        (chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true) &&
        chmod -R ug+rwX storage bootstrap/cache &&
        php artisan reverb:start --host=0.0.0.0 --port=9000
      '
    expose:
      - "9000"
    networks:
      - hive-network

  # Next.js Frontend
  frontend:
    image: ghcr.io/techiveet/hive-os-frontend:latest
    container_name: hive-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_IP: ${SERVER_IP:-}
      ROOT_DOMAIN: ${ROOT_DOMAIN:-gulfingot.com}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-hive.gulfingot.com}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-hive-backend.gulfingot.com}
      REVERB_DOMAIN: ${REVERB_DOMAIN:-hive-ws.gulfingot.com}
      HORIZON_DOMAIN: ${HORIZON_DOMAIN:-hive-queue.gulfingot.com}
      MEILISEARCH_DOMAIN: ${MEILISEARCH_DOMAIN:-hive-search.gulfingot.com}
      REMBG_DOMAIN: ${REMBG_DOMAIN:-hive-rembg.gulfingot.com}
      GOTENBERG_DOMAIN: ${GOTENBERG_DOMAIN:-hive-docs.gulfingot.com}
      REDIS_DOMAIN: ${REDIS_DOMAIN:-hive-redis.gulfingot.com}
      DB_DOMAIN: ${DB_DOMAIN:-hive-db.gulfingot.com}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_CENTRAL_DOMAINS: ${NEXT_PUBLIC_CENTRAL_DOMAINS:-}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-gulfingot.com}
      NEXT_PUBLIC_SERVER_IP: ${NEXT_PUBLIC_SERVER_IP:-}
      NEXT_PUBLIC_FRONTEND_DOMAIN: ${NEXT_PUBLIC_FRONTEND_DOMAIN:-hive.gulfingot.com}
      NEXT_PUBLIC_BACKEND_DOMAIN: ${NEXT_PUBLIC_BACKEND_DOMAIN:-hive-backend.gulfingot.com}
      NEXT_PUBLIC_REVERB_DOMAIN: ${NEXT_PUBLIC_REVERB_DOMAIN:-hive-ws.gulfingot.com}
      NEXT_PUBLIC_REVERB_APP_KEY: ${NEXT_PUBLIC_REVERB_APP_KEY}
      NEXT_PUBLIC_REVERB_HOST: ${NEXT_PUBLIC_REVERB_HOST}
      NEXT_PUBLIC_REVERB_PORT: ${NEXT_PUBLIC_REVERB_PORT}
      NEXT_PUBLIC_REVERB_SCHEME: ${NEXT_PUBLIC_REVERB_SCHEME}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      FRONTEND_INTERNAL_URL: ${FRONTEND_INTERNAL_URL:-http://frontend:3000}
      REVERB_INTERNAL_URL: ${REVERB_INTERNAL_URL:-http://reverb:9000}
      QUEUE_INTERNAL_HOST: ${QUEUE_INTERNAL_HOST:-queue}
      DB_INTERNAL_HOST: ${DB_INTERNAL_HOST:-db}
      REDIS_INTERNAL_HOST: ${REDIS_INTERNAL_HOST:-redis}
      MEILISEARCH_INTERNAL_URL: ${MEILISEARCH_INTERNAL_URL:-http://meilisearch:7700}
      REMBG_INTERNAL_URL: ${REMBG_INTERNAL_URL:-http://rembg:5000}
      GOTENBERG_INTERNAL_URL: ${GOTENBERG_INTERNAL_URL:-http://gotenberg:3000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health'').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - hive-network

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: hive-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./storage/prometheus-data:/prometheus
    expose:
      - "9090"
    networks:
      - hive-network

  # Monitoring: Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: hive-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./storage/grafana-data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - hive-network

  # Monitoring Exporter: Host Metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: hive-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - hive-network

  # Monitoring Exporter: Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: hive-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - hive-network

networks:
  hive-network:
    driver: bridge
